<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANDBOX</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="sandbox()" x-init="init()">

    <!-- ===== Sidebar ===== -->
    <aside class="sidebar" :class="{ 'collapsed': !sidebarOpen }">
        <div class="sidebar-header">
            <div class="logo">
                <span style="font-size:1.3rem;">&#x1f4e6;</span>
                <span class="logo-text" style="margin-left:0.4rem;">SANDBOX</span>
            </div>
            <button class="sidebar-toggle" @click="toggleSidebar()" :title="sidebarOpen ? 'Collapse' : 'Expand'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <template x-if="sidebarOpen">
                        <g><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></g>
                    </template>
                    <template x-if="!sidebarOpen">
                        <g><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></g>
                    </template>
                </svg>
            </button>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-title">Tags</div>

            <!-- All -->
            <div class="nav-item" :class="{ 'active': activeTag === 'all' }"
                 @click="setTag('all')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
                <span class="nav-item-text">All</span>
                <span class="badge" x-text="apps.length"></span>
            </div>

            <!-- Favorites -->
            <div class="nav-item" :class="{ 'active': activeTag === 'favorites' }"
                 @click="setTag('favorites')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                <span class="nav-item-text">Favorites</span>
                <span class="badge" x-text="apps.filter(a => a.favorite).length"></span>
            </div>

            <!-- Uncategorized -->
            <div class="nav-item" :class="{ 'active': activeTag === 'uncategorized' }"
                 @click="setTag('uncategorized')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                <span class="nav-item-text">Uncategorized</span>
                <span class="badge" x-text="apps.filter(a => !a.tags || a.tags.length === 0).length"></span>
            </div>

            <div style="height:1px;background:var(--border);margin:0.5rem 0.75rem;"></div>

            <!-- Dynamic tags -->
            <template x-for="(tag, idx) in tagOrder" :key="tag">
                <div class="nav-item" :class="{ 'active': activeTag === tag }"
                     @click="setTag(tag)"
                     draggable="true"
                     @dragstart="onTagDragStart($event, idx)"
                     @dragover.prevent="onTagDragOver($event, idx)"
                     @drop="onTagDrop($event, idx)"
                     @dragend="tagDragIdx = null">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                    <span class="nav-item-text" x-text="tag"></span>
                    <span class="badge" x-text="apps.filter(a => a.tags && a.tags.includes(tag)).length"></span>
                </div>
            </template>

            <!-- Add tag -->
            <div class="nav-item" @click="showAddTag = true" style="color:var(--accent-cyan);margin-top:0.25rem;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <span class="nav-item-text">Add Tag</span>
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="nav-item" @click="showSettings = true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span class="nav-item-text">Settings</span>
            </div>
        </div>
    </aside>

    <!-- ===== Main Content ===== -->
    <div class="main-content" :class="{ 'sidebar-collapsed': !sidebarOpen }">

        <!-- Top bar -->
        <div class="topbar">
            <div class="search-box">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="search" placeholder="Search apps..." x-model="searchQuery">
            </div>

            <div class="view-toggles">
                <button :class="{ 'active': viewMode === 'card' }" @click="setViewMode('card')" title="Card view">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                </button>
                <button :class="{ 'active': viewMode === 'list' }" @click="setViewMode('list')" title="List view">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                </button>
            </div>

            <select class="sort-select" x-model="sortBy" @change="persistPrefs()">
                <option value="order">Custom Order</option>
                <option value="alpha">A – Z</option>
                <option value="recent">Recently Used</option>
                <option value="added">Date Added</option>
            </select>
        </div>

        <!-- Content area -->
        <div class="content-area">

            <!-- Favorites section -->
            <template x-if="activeTag === 'all' && favoritedApps.length > 0 && sortBy === 'order'">
                <div>
                    <div class="section-title"><span class="star">&#9733;</span> Favorites</div>
                    <div :class="viewMode === 'card' ? 'card-grid' : 'list-view'">
                        <template x-for="app in favoritedApps" :key="app.id + '-fav'">
                            <div x-html="viewMode === 'card' ? renderCard(app) : renderListItem(app)"></div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Apps list -->
            <div class="section-title" x-text="sectionTitle"></div>

            <template x-if="filteredApps.length === 0">
                <div class="empty-state">
                    <div class="icon">&#x1f50d;</div>
                    <div>No apps found</div>
                </div>
            </template>

            <div :class="viewMode === 'card' ? 'card-grid' : 'list-view'">
                <template x-for="app in filteredApps" :key="app.id">
                    <div x-html="viewMode === 'card' ? renderCard(app) : renderListItem(app)"></div>
                </template>
            </div>
        </div>
    </div>

    <!-- ===== Edit Modal ===== -->
    <div class="modal-overlay" x-show="editingApp" x-cloak @click.self="editingApp = null"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100">
        <div class="modal" @click.stop>
            <div class="modal-title">Edit App</div>

            <div class="form-group">
                <label>Title</label>
                <input type="text" x-model="editForm.title">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea x-model="editForm.description"></textarea>
            </div>

            <div class="form-group">
                <label>Tags</label>
                <div class="checkbox-group">
                    <template x-for="tag in tagOrder" :key="'edit-'+tag">
                        <label class="checkbox-label">
                            <input type="checkbox" :value="tag"
                                   :checked="editForm.tags.includes(tag)"
                                   @change="toggleEditTag(tag)">
                            <span x-text="tag"></span>
                        </label>
                    </template>
                </div>
            </div>

            <div class="form-group">
                <label>Thumbnail</label>
                <div class="thumbnail-upload">
                    <div class="thumbnail-preview">
                        <template x-if="editForm.thumbnail">
                            <img :src="editForm.thumbnail">
                        </template>
                        <template x-if="!editForm.thumbnail">
                            <span x-text="editForm.icon || '&#x1f4e6;'"></span>
                        </template>
                    </div>
                    <input type="file" accept="image/*" @change="handleThumbnailUpload($event)">
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn" @click="editingApp = null">Cancel</button>
                <button class="btn btn-primary" @click="saveEdit()">Save</button>
            </div>
        </div>
    </div>

    <!-- ===== Add Tag Modal ===== -->
    <div class="modal-overlay" x-show="showAddTag" x-cloak @click.self="showAddTag = false">
        <div class="modal" @click.stop>
            <div class="modal-title">Add Tag</div>
            <div class="form-group">
                <label>Tag Name</label>
                <input type="text" x-model="newTagName" @keydown.enter="addTag()"
                       x-ref="newTagInput" placeholder="e.g., Estimating">
            </div>
            <div class="modal-actions">
                <button class="btn" @click="showAddTag = false; newTagName = ''">Cancel</button>
                <button class="btn btn-primary" @click="addTag()">Add</button>
            </div>
        </div>
    </div>

    <!-- ===== Settings Modal (placeholder) ===== -->
    <div class="modal-overlay" x-show="showSettings" x-cloak @click.self="showSettings = false">
        <div class="modal" @click.stop>
            <div class="modal-title">Settings</div>
            <div style="color:var(--text-secondary);padding:2rem 0;text-align:center;">
                Settings coming soon.
            </div>
            <div class="modal-actions">
                <button class="btn" @click="showSettings = false">Close</button>
            </div>
        </div>
    </div>

    <!-- ===== Toast Container ===== -->
    <div id="toast-container"></div>

    <!-- ===== Hidden styles ===== -->
    <style>
        [x-cloak] { display: none !important; }
    </style>

    <script src="/static/js/common.js"></script>
    <script>
        function sandbox() {
            return {
                // State
                sidebarOpen: true,
                viewMode: 'card',
                searchQuery: '',
                activeTag: 'all',
                sortBy: 'order',
                apps: [],
                tagOrder: [],
                editingApp: null,
                editForm: { title: '', description: '', tags: [], thumbnail: null, icon: '' },
                showAddTag: false,
                newTagName: '',
                showSettings: false,
                tagDragIdx: null,

                init() {
                    this.apps = JSON.parse(document.getElementById('apps-data').textContent);
                    this.tagOrder = JSON.parse(document.getElementById('tags-data').textContent);

                    // Restore preferences from localStorage
                    const prefs = JSON.parse(localStorage.getItem('sandbox_prefs') || '{}');
                    if (prefs.sidebarOpen !== undefined) this.sidebarOpen = prefs.sidebarOpen;
                    if (prefs.viewMode) this.viewMode = prefs.viewMode;
                    if (prefs.sortBy) this.sortBy = prefs.sortBy;

                    // Watch for Add Tag modal to focus input
                    this.$watch('showAddTag', (val) => {
                        if (val) this.$nextTick(() => this.$refs.newTagInput?.focus());
                    });
                },

                persistPrefs() {
                    localStorage.setItem('sandbox_prefs', JSON.stringify({
                        sidebarOpen: this.sidebarOpen,
                        viewMode: this.viewMode,
                        sortBy: this.sortBy,
                    }));
                },

                toggleSidebar() {
                    this.sidebarOpen = !this.sidebarOpen;
                    this.persistPrefs();
                },

                setViewMode(mode) {
                    this.viewMode = mode;
                    this.persistPrefs();
                },

                setTag(tag) {
                    this.activeTag = tag;
                },

                get filteredApps() {
                    let list = [...this.apps];

                    // Filter by tag
                    if (this.activeTag === 'favorites') {
                        list = list.filter(a => a.favorite);
                    } else if (this.activeTag === 'uncategorized') {
                        list = list.filter(a => !a.tags || a.tags.length === 0);
                    } else if (this.activeTag !== 'all') {
                        list = list.filter(a => a.tags && a.tags.includes(this.activeTag));
                    }

                    // Filter by search
                    if (this.searchQuery.trim()) {
                        const q = this.searchQuery.toLowerCase();
                        list = list.filter(a =>
                            a.title.toLowerCase().includes(q) ||
                            a.description.toLowerCase().includes(q)
                        );
                    }

                    // Sort
                    return this.sortList(list);
                },

                get favoritedApps() {
                    return this.sortList(this.apps.filter(a => a.favorite));
                },

                get sectionTitle() {
                    if (this.activeTag === 'all') return 'All Apps';
                    if (this.activeTag === 'favorites') return 'Favorites';
                    if (this.activeTag === 'uncategorized') return 'Uncategorized';
                    return this.activeTag;
                },

                sortList(list) {
                    const copy = [...list];
                    switch (this.sortBy) {
                        case 'alpha':
                            return copy.sort((a, b) => a.title.localeCompare(b.title));
                        case 'recent':
                            return copy.sort((a, b) => (b.last_used || '').localeCompare(a.last_used || ''));
                        case 'added':
                            return copy.sort((a, b) => (b.date_added || '').localeCompare(a.date_added || ''));
                        default:
                            return copy.sort((a, b) => a.order - b.order);
                    }
                },

                renderCard(app) {
                    const thumbHtml = app.thumbnail
                        ? `<img src="${app.thumbnail}" alt="">`
                        : `<span>${app.icon || '&#x1f4e6;'}</span>`;
                    const tagsHtml = (app.tags || []).map(t =>
                        `<span class="tag-pill">${this._esc(t)}</span>`
                    ).join('');
                    const favClass = app.favorite ? 'is-fav' : '';
                    return `
                        <div class="card" onclick="window.sandbox_navigate('${app.id}', '${app.url}')">
                            <button class="card-fav-btn ${favClass}" onclick="event.stopPropagation(); window.sandbox_toggleFav('${app.id}')" title="Toggle favorite">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="${app.favorite ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                            </button>
                            <button class="card-edit-btn" onclick="event.stopPropagation(); window.sandbox_edit('${app.id}')" title="Edit">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </button>
                            <div class="card-thumbnail">${thumbHtml}</div>
                            <div class="card-body">
                                <div class="card-title">${this._esc(app.title)}</div>
                                <div class="card-desc">${this._esc(app.description)}</div>
                                <div class="card-tags">${tagsHtml}</div>
                            </div>
                        </div>
                    `;
                },

                renderListItem(app) {
                    const iconHtml = app.thumbnail
                        ? `<img src="${app.thumbnail}" alt="">`
                        : `<span>${app.icon || '&#x1f4e6;'}</span>`;
                    const tagsHtml = (app.tags || []).map(t =>
                        `<span class="tag-pill">${this._esc(t)}</span>`
                    ).join('');
                    return `
                        <div class="list-item" onclick="window.sandbox_navigate('${app.id}', '${app.url}')">
                            <div class="list-item-icon">${iconHtml}</div>
                            <div class="list-item-info">
                                <div class="list-item-title">${this._esc(app.title)}</div>
                                <div class="list-item-desc">${this._esc(app.description)}</div>
                            </div>
                            <div class="list-item-tags">${tagsHtml}</div>
                            <div class="list-item-actions">
                                <button class="btn-icon ${app.favorite ? 'is-fav' : ''}" onclick="event.stopPropagation(); window.sandbox_toggleFav('${app.id}')" title="Toggle favorite" style="${app.favorite ? 'color:var(--accent-orange)' : ''}">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="${app.favorite ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                                </button>
                                <button class="btn-icon" onclick="event.stopPropagation(); window.sandbox_edit('${app.id}')" title="Edit">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                </button>
                            </div>
                        </div>
                    `;
                },

                _esc(str) {
                    const d = document.createElement('div');
                    d.textContent = str || '';
                    return d.innerHTML;
                },

                // ── Actions ──

                openEdit(appId) {
                    const app = this.apps.find(a => a.id === appId);
                    if (!app) return;
                    this.editForm = {
                        title: app.title,
                        description: app.description,
                        tags: [...(app.tags || [])],
                        thumbnail: app.thumbnail,
                        icon: app.icon,
                    };
                    this.editingApp = appId;
                },

                toggleEditTag(tag) {
                    const idx = this.editForm.tags.indexOf(tag);
                    if (idx >= 0) {
                        this.editForm.tags.splice(idx, 1);
                    } else {
                        this.editForm.tags.push(tag);
                    }
                },

                async saveEdit() {
                    const appId = this.editingApp;
                    const spinner = showSpinner(document.querySelector('.modal'));
                    try {
                        const res = await fetch(`/api/apps/${appId}`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                title: this.editForm.title,
                                description: this.editForm.description,
                                tags: this.editForm.tags,
                                thumbnail: this.editForm.thumbnail,
                            }),
                        });
                        if (res.ok) {
                            const app = this.apps.find(a => a.id === appId);
                            if (app) {
                                app.title = this.editForm.title;
                                app.description = this.editForm.description;
                                app.tags = [...this.editForm.tags];
                                app.thumbnail = this.editForm.thumbnail;
                            }
                            this.editingApp = null;
                            showToast('App updated');
                        } else {
                            showToast('Failed to save', 'error');
                        }
                    } catch {
                        showToast('Failed to save', 'error');
                    } finally {
                        hideSpinner(spinner);
                    }
                },

                async handleThumbnailUpload(event) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const appId = this.editingApp;
                    const spinner = showSpinner(document.querySelector('.modal'));
                    try {
                        const res = await uploadFile(`/api/apps/${appId}/thumbnail`, file);
                        const data = await res.json();
                        if (res.ok) {
                            this.editForm.thumbnail = data.thumbnail;
                            showToast('Thumbnail uploaded');
                        } else {
                            showToast('Upload failed', 'error');
                        }
                    } catch {
                        showToast('Upload failed', 'error');
                    } finally {
                        hideSpinner(spinner);
                    }
                },

                async toggleFavorite(appId) {
                    const app = this.apps.find(a => a.id === appId);
                    if (!app) return;
                    const newVal = !app.favorite;
                    try {
                        const res = await fetch(`/api/apps/${appId}`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ favorite: newVal }),
                        });
                        if (res.ok) {
                            app.favorite = newVal;
                            showToast(newVal ? 'Added to favorites' : 'Removed from favorites');
                        }
                    } catch {
                        showToast('Failed to update', 'error');
                    }
                },

                async navigateToApp(appId, url) {
                    try {
                        await fetch(`/api/apps/${appId}/use`, { method: 'POST' });
                    } catch { /* best-effort */ }
                    window.location.href = url;
                },

                async addTag() {
                    const name = this.newTagName.trim();
                    if (!name) return;
                    try {
                        const res = await fetch('/api/tags', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name }),
                        });
                        const data = await res.json();
                        if (res.ok) {
                            this.tagOrder.push(name);
                            this.showAddTag = false;
                            this.newTagName = '';
                            showToast(`Tag "${name}" added`);
                        } else {
                            showToast(data.error || 'Failed to add tag', 'error');
                        }
                    } catch {
                        showToast('Failed to add tag', 'error');
                    }
                },

                // ── Tag drag & drop ──

                onTagDragStart(event, idx) {
                    this.tagDragIdx = idx;
                    event.dataTransfer.effectAllowed = 'move';
                },

                onTagDragOver(event, idx) {
                    if (this.tagDragIdx === null || this.tagDragIdx === idx) return;
                    event.dataTransfer.dropEffect = 'move';
                },

                async onTagDrop(event, toIdx) {
                    const fromIdx = this.tagDragIdx;
                    if (fromIdx === null || fromIdx === toIdx) return;
                    const item = this.tagOrder.splice(fromIdx, 1)[0];
                    this.tagOrder.splice(toIdx, 0, item);
                    this.tagDragIdx = null;
                    try {
                        await fetch('/api/tags/reorder', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ order: this.tagOrder }),
                        });
                    } catch { /* best-effort */ }
                },
            };
        }

        // Global functions for onclick handlers inside rendered HTML
        window.sandbox_navigate = function(id, url) {
            const comp = document.querySelector('[x-data]').__x.$data;
            comp.navigateToApp(id, url);
        };
        window.sandbox_edit = function(id) {
            const comp = document.querySelector('[x-data]').__x.$data;
            comp.openEdit(id);
        };
        window.sandbox_toggleFav = function(id) {
            const comp = document.querySelector('[x-data]').__x.$data;
            comp.toggleFavorite(id);
        };
    </script>

    <!-- Server-injected data -->
    <script type="application/json" id="apps-data">{{ apps_json | safe }}</script>
    <script type="application/json" id="tags-data">{{ tags_json | safe }}</script>
</body>
</html>
