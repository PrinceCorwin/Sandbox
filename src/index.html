<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANDBOX</title>
    <link rel="stylesheet" href="css/base.css">
    <script defer src="js/alpine.min.js"></script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body x-data="sandbox()" x-init="init()">

    <!-- ===== Sidebar ===== -->
    <aside class="sidebar" :class="{ 'collapsed': !sidebarOpen }">
        <div class="sidebar-header">
            <div class="logo">
                <span style="font-size:1.3rem;">&#x1f4e6;</span>
                <span class="logo-text" style="margin-left:0.4rem;">SANDBOX</span>
            </div>
            <button class="sidebar-toggle" @click="toggleSidebar()" :title="sidebarOpen ? 'Collapse' : 'Expand'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-title">Tags</div>

            <!-- All -->
            <div class="nav-item" :class="{ 'active': activeTag === 'all' }"
                 @click="setTag('all')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
                <span class="nav-item-text">All</span>
                <span class="badge" x-text="apps.length"></span>
            </div>

            <!-- Favorites -->
            <div class="nav-item" :class="{ 'active': activeTag === 'favorites' }"
                 @click="setTag('favorites')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                <span class="nav-item-text">Favorites</span>
                <span class="badge" x-text="apps.filter(a => a.favorite).length"></span>
            </div>

            <!-- Uncategorized -->
            <div class="nav-item" :class="{ 'active': activeTag === 'uncategorized' }"
                 @click="setTag('uncategorized')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                <span class="nav-item-text">Uncategorized</span>
                <span class="badge" x-text="apps.filter(a => !a.tags || a.tags.length === 0).length"></span>
            </div>

            <div style="height:1px;background:var(--border);margin:0.5rem 0.75rem;"></div>

            <!-- Dynamic tags (alphabetical) -->
            <template x-for="tag in sortedTags" :key="tag">
                <div class="nav-item" :class="{ 'active': activeTag === tag }"
                     @click="setTag(tag)">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                    <span class="nav-item-text" x-text="tag"></span>
                    <span class="badge" x-text="apps.filter(a => a.tags && a.tags.includes(tag)).length"></span>
                    <button class="tag-delete-btn" @click.stop="deleteTag(tag)" title="Delete tag">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
            </template>

            <!-- Add tag -->
            <div class="nav-item" @click="showAddTag = true" style="color:var(--accent-cyan);margin-top:0.25rem;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <span class="nav-item-text">Add Tag</span>
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="nav-item" @click="showSettings = true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span class="nav-item-text">Settings</span>
            </div>
        </div>
    </aside>

    <!-- ===== Main Content ===== -->
    <div class="main-content" :class="{ 'sidebar-collapsed': !sidebarOpen }">

        <!-- Top bar -->
        <div class="topbar">
            <div class="search-box">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="search" placeholder="Search apps..." x-model="searchQuery">
            </div>

            <div class="view-toggles">
                <button :class="{ 'active': viewMode === 'card' }" @click="setViewMode('card')" title="Card view">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                </button>
                <button :class="{ 'active': viewMode === 'list' }" @click="setViewMode('list')" title="List view">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                </button>
            </div>

            <select class="sort-select" x-model="sortBy" @change="persistPrefs()">
                <option value="order">Custom Order</option>
                <option value="alpha">A – Z</option>
                <option value="recent">Recently Used</option>
                <option value="added">Date Added</option>
            </select>
        </div>

        <!-- Content area -->
        <div class="content-area">

            <!-- Favorites section (card view) -->
            <div x-show="activeTag === 'all' && favoritedApps.length > 0 && sortBy === 'order' && viewMode === 'card'">
                <div class="section-title"><span class="star">&#9733;</span> Favorites</div>
                <div class="card-grid">
                    <template x-for="fav in favoritedApps" :key="fav.id + '-fav-card'">
                        <div class="card" @click="navigateToApp(fav.id, fav.url)">
                            <button class="card-fav-btn" :class="{ 'is-fav': fav.favorite }" @click.stop="toggleFavorite(fav.id)" title="Toggle favorite">
                                <svg width="16" height="16" viewBox="0 0 24 24" :fill="fav.favorite ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                            </button>
                            <button class="card-edit-btn" @click.stop="openEdit(fav.id)" title="Edit">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </button>
                            <div class="card-thumbnail">
                                <img x-show="fav.thumbnailDataUrl" :src="fav.thumbnailDataUrl" alt="">
                                <span x-show="!fav.thumbnailDataUrl" x-text="fav.icon || '\u{1f4e6}'"></span>
                            </div>
                            <div class="card-body">
                                <div class="card-title" x-text="fav.title"></div>
                                <div class="card-desc" x-text="fav.description"></div>
                                <div class="card-tags">
                                    <template x-for="t in (fav.tags || [])" :key="t"><span class="tag-pill" x-text="t"></span></template>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Favorites section (list view) -->
            <div x-show="activeTag === 'all' && favoritedApps.length > 0 && sortBy === 'order' && viewMode === 'list'">
                <div class="section-title"><span class="star">&#9733;</span> Favorites</div>
                <div class="list-view">
                    <template x-for="fav in favoritedApps" :key="fav.id + '-fav-list'">
                        <div class="list-item" @click="navigateToApp(fav.id, fav.url)">
                            <div class="list-item-icon">
                                <img x-show="fav.thumbnailDataUrl" :src="fav.thumbnailDataUrl" alt="">
                                <span x-show="!fav.thumbnailDataUrl" x-text="fav.icon || '\u{1f4e6}'"></span>
                            </div>
                            <div class="list-item-info">
                                <div class="list-item-title" x-text="fav.title"></div>
                                <div class="list-item-desc" x-text="fav.description"></div>
                            </div>
                            <div class="list-item-tags">
                                <template x-for="t in (fav.tags || [])" :key="t"><span class="tag-pill" x-text="t"></span></template>
                            </div>
                            <div class="list-item-actions">
                                <button class="btn-icon" :class="{ 'is-fav': fav.favorite }" @click.stop="toggleFavorite(fav.id)" title="Toggle favorite" :style="fav.favorite ? 'color:var(--accent-orange)' : ''">
                                    <svg width="16" height="16" viewBox="0 0 24 24" :fill="fav.favorite ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                                </button>
                                <button class="btn-icon" @click.stop="openEdit(fav.id)" title="Edit">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Apps list -->
            <div class="section-title" x-text="sectionTitle"></div>

            <div x-show="filteredApps.length === 0" class="empty-state">
                <div class="icon">&#x1f50d;</div>
                <div>No apps found</div>
            </div>

            <!-- Card view -->
            <div class="card-grid" x-show="viewMode === 'card'">
                <template x-for="app in filteredApps" :key="app.id + '-card'">
                    <div class="card" @click="navigateToApp(app.id, app.url)">
                        <button class="card-fav-btn" :class="{ 'is-fav': app.favorite }" @click.stop="toggleFavorite(app.id)" title="Toggle favorite">
                            <svg width="16" height="16" viewBox="0 0 24 24" :fill="app.favorite ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        </button>
                        <button class="card-edit-btn" @click.stop="openEdit(app.id)" title="Edit">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <div class="card-thumbnail">
                            <img x-show="app.thumbnailDataUrl" :src="app.thumbnailDataUrl" alt="">
                            <span x-show="!app.thumbnailDataUrl" x-text="app.icon || '\u{1f4e6}'"></span>
                        </div>
                        <div class="card-body">
                            <div class="card-title" x-text="app.title"></div>
                            <div class="card-desc" x-text="app.description"></div>
                            <div class="card-tags">
                                <template x-for="t in (app.tags || [])" :key="t"><span class="tag-pill" x-text="t"></span></template>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <!-- List view -->
            <div class="list-view" x-show="viewMode === 'list'">
                <template x-for="app in filteredApps" :key="app.id + '-list'">
                    <div class="list-item" @click="navigateToApp(app.id, app.url)">
                        <div class="list-item-icon">
                            <img x-show="app.thumbnailDataUrl" :src="app.thumbnailDataUrl" alt="">
                            <span x-show="!app.thumbnailDataUrl" x-text="app.icon || '\u{1f4e6}'"></span>
                        </div>
                        <div class="list-item-info">
                            <div class="list-item-title" x-text="app.title"></div>
                            <div class="list-item-desc" x-text="app.description"></div>
                        </div>
                        <div class="list-item-tags">
                            <template x-for="t in (app.tags || [])" :key="t"><span class="tag-pill" x-text="t"></span></template>
                        </div>
                        <div class="list-item-actions">
                            <button class="btn-icon" :class="{ 'is-fav': app.favorite }" @click.stop="toggleFavorite(app.id)" title="Toggle favorite" :style="app.favorite ? 'color:var(--accent-orange)' : ''">
                                <svg width="16" height="16" viewBox="0 0 24 24" :fill="app.favorite ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                            </button>
                            <button class="btn-icon" @click.stop="openEdit(app.id)" title="Edit">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- ===== Edit Modal ===== -->
    <div class="modal-overlay" x-show="editingApp" x-cloak @click.self="editingApp = null"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100">
        <div class="modal" @click.stop>
            <div class="modal-title">Edit App</div>

            <div class="form-group">
                <label>Title</label>
                <input type="text" x-model="editForm.title">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea x-model="editForm.description"></textarea>
            </div>

            <div class="form-group" x-data="{ tagDropOpen: false }">
                <label>Tags</label>
                <div class="tag-dropdown">
                    <button class="tag-dropdown-toggle" @click="tagDropOpen = !tagDropOpen" type="button">
                        <span x-text="editForm.tags.length ? editForm.tags.sort().join(', ') : 'Select tags...'"></span>
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <div class="tag-dropdown-menu" x-show="tagDropOpen" @click.outside="tagDropOpen = false">
                        <template x-for="tag in sortedTags" :key="'edit-'+tag">
                            <label class="tag-dropdown-item" @click.stop>
                                <input type="checkbox" :value="tag"
                                       :checked="editForm.tags.includes(tag)"
                                       @change="toggleEditTag(tag)">
                                <span x-text="tag"></span>
                            </label>
                        </template>
                        <div x-show="sortedTags.length === 0" style="padding:0.5rem 0.75rem;color:var(--text-muted);font-size:0.85rem;">No tags yet</div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Thumbnail</label>
                <div class="thumbnail-upload">
                    <div class="thumbnail-preview">
                        <template x-if="editForm.thumbnail">
                            <img :src="editForm.thumbnailDataUrl || ''">
                        </template>
                        <template x-if="!editForm.thumbnail">
                            <span x-text="editForm.icon || '&#x1f4e6;'"></span>
                        </template>
                    </div>
                    <button class="btn" @click="handleThumbnailUpload()">Choose Image...</button>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn" @click="editingApp = null">Cancel</button>
                <button class="btn btn-primary" @click="saveEdit()">Save</button>
            </div>
        </div>
    </div>

    <!-- ===== Add Tag Modal ===== -->
    <div class="modal-overlay" x-show="showAddTag" x-cloak @click.self="showAddTag = false">
        <div class="modal" @click.stop>
            <div class="modal-title">Add Tag</div>
            <div class="form-group">
                <label>Tag Name</label>
                <input type="text" x-model="newTagName" @keydown.enter="addTag()"
                       x-ref="newTagInput" placeholder="e.g., Estimating">
            </div>
            <div class="modal-actions">
                <button class="btn" @click="showAddTag = false; newTagName = ''">Cancel</button>
                <button class="btn btn-primary" @click="addTag()">Add</button>
            </div>
        </div>
    </div>

    <!-- ===== Settings Modal ===== -->
    <div class="modal-overlay" x-show="showSettings" x-cloak @click.self="showSettings = false">
        <div class="modal" @click.stop>
            <div class="modal-title">Settings</div>
            <div style="color:var(--text-secondary);padding:2rem 0;text-align:center;">
                Settings coming soon.
            </div>
            <div class="modal-actions">
                <button class="btn" @click="showSettings = false">Close</button>
            </div>
        </div>
    </div>

    <!-- ===== Toast Container ===== -->
    <div id="toast-container"></div>

    <script src="js/common.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
