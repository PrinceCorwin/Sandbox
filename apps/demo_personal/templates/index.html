<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }} — SANDBOX</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <style>
        .miniapp-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.5rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }
        .miniapp-topbar .app-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .miniapp-body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 60px);
            padding: 2rem;
        }
        .message-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 3rem 4rem;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }
        .message-card .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .message-card .text {
            font-size: 1.25rem;
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="miniapp-topbar">
        <a href="/" class="btn btn-ghost" title="Home">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            Home
        </a>
        <span class="app-title">{{ app_name }}</span>
        <a href="/" class="btn btn-ghost" title="Close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
            Close
        </a>
    </div>
    <div class="miniapp-body">
        <div class="message-card">
            <div class="icon">&#x1f3e0;</div>
            <div class="text">{{ message }}</div>
        </div>
    </div>
    <div id="toast-container"></div>
    <script src="/static/js/common.js"></script>
</body>
</html>
